# ALTERNATIVA ao Caddy: para quem já tem nginx no host.
# Coloque em /etc/nginx/conf.d/ (contexto http) para o `map` abaixo valer.
# Requer que o bot publique a porta no host. No docker-compose.yml, no serviço `bot`, adicione:
#   ports:
#     - "127.0.0.1:4201:4201"
# E gere o certificado com:  certbot --nginx -d api.konbdemo.xyz

# Upgrade só quando há header Upgrade (REST normal não envia "Connection: upgrade").
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.konbdemo.xyz;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.konbdemo.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.konbdemo.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.konbdemo.xyz/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:4201;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WS de longa duração não pode dar timeout
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
